<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo - THTSC SHOP</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:#fff;
display:flex;
flex-direction:column;
min-height:100vh;
opacity:0;
transition:.4s;
}
body.show{opacity:1}

/* HEADER */
.header-box{
margin:10px;
background:#ffffff10;
backdrop-filter:blur(10px);
border-radius:14px;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}
.icon-group{display:flex;gap:10px}
.icon-btn{
background:#ffffff20;
border:none;
border-radius:50%;
width:36px;
height:36px;
color:#fff;
cursor:pointer;
}

/* MENU */
.menu-btn span{
display:block;
width:18px;
height:2px;
background:#fff;
margin:3px 0
}
.side-menu{
position:fixed;
top:0;
right:-280px;
width:260px;
height:100%;
background:#111;
color:#fff;
transition:.3s;
z-index:999;
padding:15px;
overflow:auto
}
.side-menu.active{right:0}
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none
}
.overlay.active{display:block}
.menu-item{
padding:10px;
border-radius:8px;
margin-bottom:5px;
font-weight:bold;
cursor:pointer
}
.menu-item:hover{background:#333}

/* MAIN */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

/* GEAR */
.gear{
font-size:80px;
animation:spin 2s linear infinite;
margin-bottom:20px;
}
@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* TEXT */
.text{
font-size:20px;
font-weight:bold;
line-height:1.6;
}

/* FOOTER */
.footer{
background:#ffffff10;
backdrop-filter:blur(10px);
color:#fff;
text-align:center;
padding:20px;
}
.footer .btn-group{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px
}
.footer button{
background:#ffffff20;
border:none;
padding:10px;
border-radius:20px;
color:#fff;
cursor:pointer
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<div style="text-align:center;margin-bottom:10px">
<img src="images/logo.png" style="width:70px;height:70px;border-radius:50%">
<b>MENU</b>
</div>

<h3>-- MAIN --</h3>
<div class="menu-item" onclick="goPage('../index.html')">🏠 Trang chủ</div>

<h3>-- SHOP ACC --</h3>
<div class="menu-item" onclick="goPage('../vip.html')">💎 Acc VIP</div>
<div class="menu-item" onclick="goPage('../clone.html')">🧩 Acc Clone</div>
<div class="menu-item" onclick="goPage('../thuong.html')">📦 Acc Thường</div>

<h3>-- CÀY THUÊ --</h3>
<div class="menu-item" onclick="goPage('../ball.html')">⚽ Cày Ball</div>
<div class="menu-item" onclick="goPage('../vang.html')">💰 Cày Vàng</div>
<div class="menu-item" onclick="goPage('../cotruyen.html')">📖 Cày Cốt Truyện</div>
<div class="menu-item" onclick="goPage('../dautruong.html')">🏆 Cày Đấu Trường</div>
</div>

<div class="header-box">
<div class="logo-wrap">
<img src="../images/logo.png" class="logo-img">
<b>THTSC SHOP</b>
</div>
<div class="icon-group">
<button class="icon-btn menu-btn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</button>
</div>
</div>

<div class="main">
<div class="gear">⚙️</div>
<div class="text">
Tính năng sẽ sớm có trên shop.<br>
Vui lòng chờ thêm...
</div>
</div>

<div class="footer">
<b>HỖ TRỢ KHÁCH HÀNG</b>
<div>Liên hệ nhanh để được hỗ trợ</div>
<div class="btn-group">
<button onclick="goZalo()">📞 Zalo</button>
<button onclick="goLink('https://zalo.me/g/xxxx')">👥 Group</button>
<button onclick="goLink('https://facebook.com')">📘 Facebook</button>
</div>
</div>

<script>
function goPage(link){window.location.href=link}
function goLink(link){window.open(link,'_blank')}
function goZalo(){window.open("https://zalo.me/0123456789","_blank")}

function toggleMenu(){
 document.getElementById('sideMenu').classList.toggle('active');
 document.getElementById('overlay').classList.toggle('active');
}
function closeMenu(){
 document.getElementById('sideMenu').classList.remove('active');
 document.getElementById('overlay').classList.remove('active');
}

document.addEventListener('DOMContentLoaded',()=>{
 setTimeout(()=>document.body.classList.add('show'),50);
});
</script>

</body>
</html>
