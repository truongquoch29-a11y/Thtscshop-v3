<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết Acc - THTSC SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;transition:.3s;opacity:0}
body.show{opacity:1}

/* HEADER */
.header-box{margin:10px;background:#fff;border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}
.icon-group{display:flex;gap:10px}
.icon-btn{background:#eee;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer}

/* MENU */
.menu-btn span{display:block;width:18px;height:2px;background:#000;margin:3px 0}
.side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#fff;transition:.3s;z-index:999;padding:15px}
.side-menu.active{right:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none}
.overlay.active{display:block}
.menu-item{padding:10px;border-radius:8px;margin-bottom:5px;font-weight:bold}
.menu-item:hover{background:#eee}

/* TITLE */
.title-box{
margin:10px;
background:linear-gradient(45deg,#ff4500,#ff7f50);
color:#fff;
padding:20px;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:20px;
box-shadow:0 6px 18px rgba(0,0,0,.2)
}

/* BOX */
.box{margin:10px;background:#fff;border-radius:14px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,.1)}

/* PRICE */
.price{font-size:22px;color:#00aa7f;font-weight:bold}

/* IMAGE */
.img-list{display:flex;flex-direction:column;gap:10px}
.img-list img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
transition:.3s
}
.img-list img:hover{transform:scale(1.03)}

/* BUTTON */
.btn-buy{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#ff7f50,#ff4500);
color:#fff;
font-weight:bold;
cursor:pointer;
animation:glow 1.5s infinite
}

@keyframes glow{
0%{box-shadow:0 0 5px #ff4500}
50%{box-shadow:0 0 18px #ff4500}
100%{box-shadow:0 0 5px #ff4500}
}

/* FOOTER */
.footer{background:#fff;text-align:center;padding:20px;margin-top:10px}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999
}
.popup.show{
opacity:1;
pointer-events:auto
}

.popup-box{
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
width:85%;
max-width:320px;
animation:scaleIn .3s
}

@keyframes scaleIn{
from{transform:scale(.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.btn-confirm{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4500;
color:#fff;
cursor:pointer;
animation:glow 1.5s infinite
}

/* DARK */
.dark{background:#111;color:#fff}
.dark .header-box,.dark .box,.dark .footer,.dark .side-menu{background:#222;color:#fff}
.dark .menu-btn span{background:#fff}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<div class="menu-item" onclick="goPage('index.html')">🏠 Trang chủ</div>
<div class="menu-item" onclick="goPage('vip.html')">💎 Acc VIP</div>
</div>

<div class="header-box">
<div class="logo-wrap">
<img src="vip/images/logo.png" class="logo-img">
<b>THTSC SHOP</b>
</div>
<div class="icon-group">
<button class="icon-btn" onclick="toggleMode()" id="modeBtn">🌙</button>
<button class="icon-btn menu-btn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</button>
</div>
</div>

<div class="title-box" id="accTitle">ACC VIP</div>

<div class="box">
<div class="price" id="priceNew"></div>

<div class="img-list" id="imgs"></div>

<p>⚠️ Acc dính xác minh</p>
<p>🚫 Game không bảo hành</p>
<p>🆔 Mã acc: <span id="accCode"></span></p>

<button class="btn-buy" onclick="openPopup()">MUA NGAY</button>
</div>

<div class="footer">
<b>HỖ TRỢ KHÁCH HÀNG</b>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<p id="popupText"></p>
<button class="btn-confirm" onclick="goZalo()">XÁC NHẬN</button>
</div>
</div>

<script>
function toggleMode(){
 document.body.classList.toggle('dark');
 localStorage.setItem('mode', document.body.classList.contains('dark')?'dark':'light');
}

function loadMode(){
 if(localStorage.getItem('mode')==='dark'){
  document.body.classList.add('dark');
 }
}

function toggleMenu(){
 document.getElementById('sideMenu').classList.toggle('active');
 document.getElementById('overlay').classList.toggle('active');
}

function closeMenu(){
 document.getElementById('sideMenu').classList.remove('active');
 document.getElementById('overlay').classList.remove('active');
}

function goPage(link){window.location.href=link}

/* LOAD DATA */
let path = window.location.pathname;
let id = path.substring(path.lastIndexOf('/')+1).replace('.html','');

document.getElementById('accTitle').textContent = id;
document.getElementById('accCode').textContent = id;
document.getElementById('priceNew').textContent = localStorage.getItem('price_new');

/* LOAD ẢNH */
let box = document.getElementById('imgs');
for(let i=1;i<=5;i++){
 let img=document.createElement('img');
 img.src = "images/"+id+"m"+i+".png";
 img.onerror=function(){this.style.display='none'};
 box.appendChild(img);
}

/* POPUP */
function openPopup(){
 document.getElementById('popupText').innerHTML =
 "Bạn cần liên hệ admin để mua mã acc: <b>"+id+"</b><br><br>Cảm ơn đã ủng hộ shop.<br>Chúc bạn có trải nghiệm vui vẻ";
 document.getElementById('popup').classList.add('show');
}

function goZalo(){
 window.open("https://zalo.me/0702093263","_blank");
}

/* LOAD */
document.addEventListener('DOMContentLoaded',()=>{
 loadMode();
 setTimeout(()=>document.body.classList.add('show'),50);
});
</script>

</body>
</html>
