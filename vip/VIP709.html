<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết Acc - THTSC SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;transition:.4s;opacity:0}
body.show{opacity:1}

/* HEADER */
.header-box{margin:10px;background:#fff;border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}
.icon-group{display:flex;gap:10px}
.icon-btn{background:#eee;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;transition:.3s}
.icon-btn:hover{transform:scale(1.15)}

/* MENU */
.menu-btn span{display:block;width:18px;height:2px;background:#000;margin:3px 0}
.side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#fff;transition:.3s;z-index:999;padding:15px}
.side-menu.active{right:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none}
.overlay.active{display:block}
.menu-item{padding:10px;border-radius:8px;margin-bottom:5px;font-weight:bold;cursor:pointer}
.menu-item:hover{background:#eee}

/* TITLE */
.banner{
margin:10px;
padding:20px;
border-radius:14px;
background:linear-gradient(45deg,#ff7f50,#ff4500);
color:#fff;
font-weight:bold;
font-size:20px;
text-align:center;
animation:fadeIn .6s
}

/* BOX */
.box{margin:10px;background:#fff;border-radius:14px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,.1)}

/* PRICE */
.price{font-size:22px;color:#00c896;font-weight:bold}

/* IMAGE */
.img-list{display:flex;flex-direction:column;gap:10px}
.img-list img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
transition:.3s
}
.img-list img:hover{transform:scale(1.04)}

/* UPLOAD */
.upload-box{
margin-top:10px;
padding:10px;
border:2px dashed #ccc;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.3s
}
.upload-box:hover{background:#fafafa}

/* BUTTON */
.btn-buy{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
font-weight:bold;
cursor:pointer;
font-size:15px;
animation:pulse 1.5s infinite
}
@keyframes pulse{
0%{box-shadow:0 0 5px #0072ff}
50%{box-shadow:0 0 20px #00c6ff}
100%{box-shadow:0 0 5px #0072ff}
}

/* FOOTER */
.footer{background:#fff;text-align:center;padding:20px;margin-top:10px}
.footer .btn-group{display:flex;justify-content:center;gap:10px;margin-top:10px}
.footer button{padding:10px;border:none;border-radius:20px;cursor:pointer}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999
}
.popup.show{opacity:1;pointer-events:auto}

.popup-box{
background:#fff;
padding:20px;
border-radius:14px;
width:85%;
max-width:330px;
text-align:center;
animation:zoom .3s
}
@keyframes zoom{from{transform:scale(.7)}to{transform:scale(1)}}

.popup-box p{margin:10px 0}

.popup-btns{display:flex;gap:10px;margin-top:10px}
.popup-btns button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold
}
.btn-ok{background:#00c896;color:#fff}
.btn-cancel{background:#ccc}

/* DARK */
.dark{background:#111;color:#fff}
.dark .header-box,.dark .box,.dark .footer,.dark .side-menu{background:#222;color:#fff}
.dark .menu-btn span{background:#fff}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<h3>-- MENU --</h3>
<div class="menu-item" onclick="goPage('../index.html')">🏠 Trang chủ</div>
<div class="menu-item" onclick="goPage('../vip.html')">💎 Acc VIP</div>
<div class="menu-item" onclick="goPage('../clone.html')">🧩 Acc Clone</div>
<div class="menu-item" onclick="goPage('../thuong.html')">📦 Acc Thường</div>
</div>

<div class="header-box">
<div class="logo-wrap">
<img src="../images/logo.png" class="logo-img">
<b>THTSC SHOP</b>
</div>
<div class="icon-group">
<button class="icon-btn" onclick="toggleMode()">🌙</button>
<button class="icon-btn menu-btn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</button>
</div>
</div>

<div class="banner" id="accTitle">ACC</div>

<div class="box">
<div class="price" id="priceNew"></div>

<div class="img-list" id="imgs"></div>

<div class="upload-box" onclick="uploadImg()">📤 Tải thêm ảnh</div>

<p>⚠️ Acc dính xác minh</p>
<p>🚫 Game không bảo hành</p>
<p>🆔 Mã acc: <span id="accCode"></span></p>

<button class="btn-buy" onclick="openPopup()">💳 MUA NGAY</button>
</div>

<div class="footer">
<b>HỖ TRỢ KHÁCH HÀNG</b>
<div class="btn-group">
<button onclick="goZalo()">📞 Zalo</button>
<button onclick="goPage('../index.html')">🏠 Trang chủ</button>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>📢 THÔNG BÁO</h3>
<p id="popupText"></p>
<div class="popup-btns">
<button class="btn-ok" onclick="goZalo()">XÁC NHẬN</button>
<button class="btn-cancel" onclick="closePopup()">HỦY</button>
</div>
</div>
</div>

<script>
function toggleMode(){
 document.body.classList.toggle('dark');
 localStorage.setItem('mode',document.body.classList.contains('dark')?'dark':'light');
}

function toggleMenu(){
 document.getElementById('sideMenu').classList.toggle('active');
 document.getElementById('overlay').classList.toggle('active');
}

function closeMenu(){
 document.getElementById('sideMenu').classList.remove('active');
 document.getElementById('overlay').classList.remove('active');
}

function goPage(link){window.location.href=link}

function goZalo(){window.open("https://zalo.me/0123456789","_blank")}

/* LOAD DATA */
let id=location.pathname.split('/').pop().replace('.html','');
document.getElementById('accTitle').textContent=id;
document.getElementById('accCode').textContent=id;
document.getElementById('priceNew').textContent=localStorage.getItem('price_new');

/* LOAD ẢNH */
let box=document.getElementById('imgs');
for(let i=1;i<=5;i++){
 let img=document.createElement('img');
 img.src="images/"+id+"m"+i+".png";
 img.onerror=function(){this.style.display='none'};
 box.appendChild(img);
}

/* UPLOAD (demo) */
function uploadImg(){alert("Chức năng demo")}

/* POPUP */
function openPopup(){
 document.getElementById('popupText').innerHTML=
 "Bạn cần liên hệ admin để mua mã acc: <b>"+id+"</b><br><br>Cảm ơn đã ủng hộ shop<br>Chúc bạn trải nghiệm vui vẻ";
 document.getElementById('popup').classList.add('show');
}

function closePopup(){
 document.getElementById('popup').classList.remove('show');
}

document.addEventListener('DOMContentLoaded',()=>{
 setTimeout(()=>document.body.classList.add('show'),50);
});
</script>

</body>
</html>
