<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết Acc - THTSC SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;transition:.4s;opacity:0}
body.show{opacity:1}

/* HEADER */
.header-box{margin:10px;background:#fff;border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}
.icon-group{display:flex;gap:10px}
.icon-btn{background:#eee;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer}

/* MENU */
.menu-btn span{display:block;width:18px;height:2px;background:#000;margin:3px 0}
.side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#fff;transition:.3s;z-index:999;padding:15px;overflow:auto}
.side-menu.active{right:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none}
.overlay.active{display:block}
.menu-item{padding:10px;border-radius:8px;margin-bottom:5px;font-weight:bold;cursor:pointer}
.menu-item:hover{background:#eee}

/* TITLE */
.acc-title{margin:10px;text-align:center;font-size:22px;font-weight:bold;text-transform:uppercase}

/* BOX */
.box{margin:10px;background:#fff;border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.15)}

/* IMAGE */
.img-list{display:flex;flex-direction:column;gap:12px;margin:10px 0}
.img-list img{width:100%;height:180px;object-fit:cover;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,.2)}

/* INFO */
.info{background:#f9f9f9;padding:14px;border-radius:12px;font-size:14px;margin-top:10px}

/* ACC */
.acc-detail{margin-top:12px;padding:12px;border-radius:12px;background:#fff3e0;border:1px solid #ffd59e;display:flex;justify-content:space-between;font-weight:bold}

/* BUTTON */
.btn-buy{margin-top:15px;width:100%;padding:14px;border:none;border-radius:30px;background:linear-gradient(90deg,#00c6ff,#0072ff);color:#fff;font-weight:bold;cursor:pointer}

/* FOOTER */
.footer{background:#fff;text-align:center;padding:20px;margin-top:20px;border-top:1px solid #ddd}
.footer .btn-group{display:flex;justify-content:center;gap:10px;margin-top:10px}
.footer button{padding:10px;border:none;border-radius:20px;background:#eee;cursor:pointer}

/* POPUP */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none}
.popup.show{opacity:1;pointer-events:auto}
.popup-box{background:#fff;padding:20px;border-radius:14px;text-align:center;width:85%;max-width:320px}
.popup-btns{display:flex;gap:10px;margin-top:10px}
.popup-btns button{flex:1;padding:10px;border:none;border-radius:20px}
.btn-ok{background:#00c896;color:#fff}
.btn-cancel{background:#ccc}

/* DARK */
.dark{background:#111;color:#fff}
.dark .header-box,.dark .box,.dark .footer,.dark .side-menu{background:#222;color:#fff}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<div style="text-align:center;margin-bottom:10px">
<img src="../images/logo.png" style="width:70px;height:70px;border-radius:50%">
<b>MENU</b>
</div>

<h3>-- MAIN --</h3>
<div class="menu-item" onclick="goPage('../index.html')">Trang chủ</div>

<h3>-- SHOP ACC --</h3>
<div class="menu-item" onclick="goPage('../vip.html')">Acc VIP</div>
<div class="menu-item" onclick="goPage('../clone.html')">Acc Clone</div>
<div class="menu-item" onclick="goPage('../thuong.html')">Acc Thường</div>

<h3>-- CÀY THUÊ --</h3>
<div class="menu-item" onclick="goPage('../ball.html')">Cày Ball</div>
<div class="menu-item" onclick="goPage('../vang.html')">Cày Vàng</div>
<div class="menu-item" onclick="goPage('../cotruyen.html')">Cày Cốt Truyện</div>
<div class="menu-item" onclick="goPage('../dautruong.html')">Cày Đấu Trường</div>
</div>

<div class="header-box">
<div class="logo-wrap">
<img src="../images/logo.png" class="logo-img">
<b>THTSC SHOP</b>
</div>
<div class="icon-group">
<button class="icon-btn" onclick="toggleMode()">🌙</button>
<button class="icon-btn menu-btn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</button>
</div>
</div>

<div class="acc-title">CHI TIẾT ACC</div>

<div class="box">
<div class="img-list" id="imgs"></div>

<div class="info">
Acc dính xác minh<br>
Không bảo hành<br>
Có vật phẩm
</div>

<div class="acc-detail">
<span id="accCode"></span>
<span id="priceNew"></span>
</div>

<button class="btn-buy" onclick="openPopup()">MUA NGAY</button>
</div>

<div class="footer">
<b>HỖ TRỢ KHÁCH HÀNG</b>
<div class="btn-group">
<button onclick="goZalo()">Zalo</button>
<button onclick="goLink('https://facebook.com')">Facebook</button>
</div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<p id="popupText"></p>
<div class="popup-btns">
<button class="btn-ok" onclick="goZalo()">OK</button>
<button class="btn-cancel" onclick="closePopup()">Hủy</button>
</div>
</div>
</div>

<script>
function toggleMode(){document.body.classList.toggle('dark')}
function goPage(link){location.href=link}
function goLink(link){window.open(link)}
function goZalo(){window.open("https://zalo.me/0123456789")}

function toggleMenu(){
sideMenu.classList.toggle('active')
overlay.classList.toggle('active')
}
function closeMenu(){
sideMenu.classList.remove('active')
overlay.classList.remove('active')
}

/* ID */
let id=location.pathname.split('/').pop().replace('.html','')
accCode.textContent="Mã acc: "+id

/* PRICE */
let price=localStorage.getItem('price_new')||"0"
price=price.replace(/\D/g,'')
if(price.length<=3) price+="000"
price=price.replace(/\B(?=(\d{3})+(?!\d))/g,".")
priceNew.textContent=price+" VND"

/* LOAD ẢNH - FIX CHẮC CHẮN */
let box=document.getElementById('imgs')

for(let i=1;i<=5;i++){

 let base="images/"+id+"m"+i

 let img=document.createElement('img')

 img.src=base+".jpg"

 img.onerror=function(){
  this.onerror=null
  this.src=base+".png"
  this.onerror=function(){
   this.onerror=null
   this.src=base+".jpeg"
   this.onerror=function(){
    this.style.display="none"
   }
  }
 }

 box.appendChild(img)
}

/* POPUP */
function openPopup(){
popupText.innerHTML="Liên hệ mua acc: <b>"+id+"</b>"
popup.classList.add('show')
}
function closePopup(){popup.classList.remove('show')}

document.addEventListener('DOMContentLoaded',()=>{
setTimeout(()=>document.body.classList.add('show'),50)
})
</script>

</body>
</html>
