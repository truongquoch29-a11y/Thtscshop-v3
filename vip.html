<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acc VIP - THTSC SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;transition:.3s;opacity:0}
body.show{opacity:1}

/* HEADER */
.header-box{margin:10px;background:#fff;border-radius:14px;padding:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}

/* ICON */
.icon-group{display:flex;gap:10px}
.icon-btn{background:#eee;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer}

/* MENU */
.menu-btn span{display:block;width:18px;height:2px;background:#000;margin:3px 0}
.side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#fff;transition:.3s;z-index:999;padding:15px}
.side-menu.active{right:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none}
.overlay.active{display:block}
.menu-item{padding:10px;border-radius:8px;margin-bottom:5px;font-weight:bold}
.menu-item:hover{background:#eee}

/* TITLE */
.section-title{text-align:center;margin:20px 0;font-size:20px;font-weight:bold}

/* GRID */
.container{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* CARD */
.card{background:#fff;border-radius:14px;overflow:hidden;position:relative;box-shadow:0 6px 18px rgba(0,0,0,.12);transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(0,0,0,.2)}

.card-img{position:relative;height:150px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}

/* BADGE */
.badge-id{
 position:absolute;
 top:8px;
 left:8px;
 background:linear-gradient(45deg,#ff4500,#ff7f50);
 color:#fff;
 padding:4px 10px;
 font-size:12px;
 border-radius:20px;
 font-weight:bold;
}

/* PRICE */
.price-tag{
 position:absolute;
 bottom:8px;
 right:8px;
 display:flex;
 flex-direction:column;
 align-items:flex-end;
 background:rgba(0,0,0,.7);
 padding:6px 10px;
 border-radius:10px;
}
.price-new{color:#00ffae;font-weight:bold;font-size:14px}

/* CONTENT */
.card-body{padding:10px}
.title{font-weight:bold;font-size:14px;margin-bottom:6px}
.info{font-size:12px;color:#555}

/* BUTTON */
.btn-buy{
 margin-top:10px;
 width:100%;
 padding:8px;
 border:none;
 border-radius:25px;
 background:linear-gradient(90deg,#ff7f50,#ff4500);
 color:#fff;
 font-weight:bold;
 cursor:pointer;
}

/* FOOTER */
.footer{background:#fff;color:#000;text-align:center;padding:20px;border-top:1px solid #ddd}
</style>
</head>

<body>

<div class="header-box">
<div class="logo-wrap">
<img src="images/logo.png" class="logo-img">
<b>THTSC SHOP</b>
</div>
</div>

<div class="section-title">💎 ACC VIP</div>

<div class="container">

<div class="card">
<div class="card-img">
<img src="images/vip1.png">
<div class="badge-id">#VIP709</div>
<div class="price-tag">
<span class="price-new">500K</span>
</div>
</div>
<div class="card-body">
<div class="title">Nhiều S+ • Nhiều S</div>
 <div class="title">Nhiều Skin + Rank Cao</div>
<button class="btn-buy" onclick="buyNow('VIP709','500K')">MUA NGAY</button>
</div>
</div>

<div class="card">
<div class="card-img">
<img src="images/vip2.png">
<div class="badge-id">#VIP708</div>
<div class="price-tag">
<span class="price-new">500K</span>
</div>
</div>
<div class="card-body">
<div class="title">Acc VIP Hiếm</div>
<button class="btn-buy" onclick="buyNow('VIP002','150K')">MUA NGAY</button>
</div>
</div>

</div>

<script>
function buyNow(id, priceNew){
 localStorage.setItem('price_new', priceNew);
 window.location.href = "vip/" + id + ".html";
}

document.addEventListener('DOMContentLoaded',()=>{
 setTimeout(()=>{document.body.classList.add('show')},50);
});
</script>

</body>
</html>
