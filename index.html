<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acc VIP - THTSC SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;transition:.3s;opacity:0}

/* FADE PAGE */
body.show{opacity:1}

/* HEADER */
.header-box{margin:10px;background:#fff;border-radius:14px;padding:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:45px;height:45px;border-radius:50%}
.logo-text{font-weight:bold;font-size:16px;text-shadow:1px 1px 2px #aaa}

.icon-group{display:flex;gap:10px}
.icon-btn{background:#eee;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;transition:.3s}
.icon-btn:hover{transform:scale(1.1)}

/* MENU */
.menu-btn span{display:block;width:18px;height:2px;background:#000;margin:3px 0;transition:.3s}
.menu-btn.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.menu-btn.active span:nth-child(2){opacity:0}
.menu-btn.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

.side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#fff;transition:.3s;z-index:999;padding:15px;overflow:auto}
.side-menu.active{right:0}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;z-index:998}
.overlay.active{display:block}

.menu-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:5px;font-weight:bold}
.menu-item:hover{background:#eee}

/* TITLE */
.section-title{text-align:center;font-weight:bold;margin:20px 0;font-size:20px;text-shadow:1px 1px 2px #aaa}

/* ACC GRID */
.container{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:12px;overflow:hidden;text-align:center;transition:.3s}
.card:hover{transform:scale(1.05);box-shadow:0 10px 20px rgba(0,0,0,.2)}
.card img{width:100%;height:140px;object-fit:cover}
.card h3{margin:8px;font-size:15px}
.card p{font-size:13px;margin:0 0 8px}

/* BUTTON */
@keyframes pulse {0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.card button{margin-bottom:10px;padding:6px 14px;border:none;border-radius:20px;background:linear-gradient(90deg,#ff7f50,#ff4500);color:#fff;cursor:pointer;font-weight:bold;animation:pulse 1.5s infinite}

/* FOOTER (GIỐNG INDEX) */
.footer{background:#fff;color:#000;text-align:center;padding:20px;border-top:1px solid #ddd}
.footer .btn-group{display:flex;justify-content:center;gap:10px;margin-top:10px}
.footer button{background:#eee;border:none;padding:10px;border-radius:20px;cursor:pointer}

/* DARK */
.dark{background:#111;color:#fff}
.dark .header-box,.dark .card,.dark .side-menu,.dark .footer{background:#222;color:#fff}
.dark .menu-item:hover{background:#333}
.dark .menu-btn span{background:#fff}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<div style="text-align:center;margin-bottom:10px">
<img src="images/logo.png" style="width:70px;height:70px;border-radius:50%">
<b>MENU</b>
</div>

<h3>-- MAIN --</h3>
<div class="menu-item" onclick="goPage('index.html')">🏠 Trang chủ</div>

<h3>-- SHOP ACC --</h3>
<div class="menu-item" onclick="goPage('vip.html')">💎 Acc VIP</div>
<div class="menu-item" onclick="goPage('clone.html')">🧩 Acc Clone</div>
<div class="menu-item" onclick="goPage('thuong.html')">📦 Acc Thường</div>

<h3>-- CÀY THUÊ --</h3>
<div class="menu-item" onclick="goPage('ball.html')">⚽ Cày Ball</div>
<div class="menu-item" onclick="goPage('vang.html')">💰 Cày Vàng</div>
<div class="menu-item" onclick="goPage('cotruyen.html')">📖 Cày Cốt Truyện</div>
<div class="menu-item" onclick="goPage('dautruong.html')">🏆 Cày Đấu Trường</div>
</div>

<div class="header-box">
<div class="logo-wrap">
<img src="images/logo.png" class="logo-img">
<div class="logo-text">THTSC SHOP</div>
</div>
<div class="icon-group">
<button class="icon-btn" onclick="toggleMode()" id="modeBtn">🌙</button>
<button class="icon-btn menu-btn" onclick="toggleMenu(this)">
<span></span><span></span><span></span>
</button>
</div>
</div>

<div class="section-title">💎 ACC VIP</div>

<div class="container">
<div class="card">
<img src="images/vip.png">
<h3>Acc VIP #001</h3>
<p>Full skin - Rank cao</p>
<button>Mua ngay</button>
</div>

<div class="card">
<img src="images/vip.png">
<h3>Acc VIP #002</h3>
<p>Nhiều vật phẩm</p>
<button>Mua ngay</button>
</div>
</div>

<div class="footer">
<b>HỖ TRỢ KHÁCH HÀNG</b>
<div>Liên hệ nhanh để được hỗ trợ và tư vấn</div>
<div class="btn-group">
<button onclick="goLink('https://zalo.me/0123456789')">📞 Zalo</button>
<button onclick="goLink('https://zalo.me/g/xxxx')">👥 Group Zalo</button>
<button onclick="goLink('https://facebook.com')">📘 Facebook</button>
</div>
</div>

<script>
function toggleMode(){
 document.body.classList.toggle('dark');
 localStorage.setItem('mode', document.body.classList.contains('dark')?'dark':'light');
 document.getElementById('modeBtn').textContent = document.body.classList.contains('dark')?'☀️':'🌙';
}

function loadMode(){
 if(localStorage.getItem('mode')==='dark'){
  document.body.classList.add('dark');
  document.getElementById('modeBtn').textContent='☀️';
 }
}

/* ANIMATION CHUYỂN TRANG */
function goPage(link){
 document.body.classList.remove('show');
 setTimeout(()=>{window.location.href=link},200);
}

function goLink(link){window.open(link,'_blank')}

function toggleMenu(btn){
 document.getElementById('sideMenu').classList.toggle('active');
 document.getElementById('overlay').classList.toggle('active');
 btn.classList.toggle('active');
}

function closeMenu(){
 document.getElementById('sideMenu').classList.remove('active');
 document.getElementById('overlay').classList.remove('active');
 document.querySelector('.menu-btn').classList.remove('active');
}

document.addEventListener('DOMContentLoaded',()=>{
 loadMode();
 setTimeout(()=>{document.body.classList.add('show')},50);
});
</script>

</body>
</html>
