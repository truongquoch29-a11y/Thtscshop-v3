<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THTSC SHOP</title><style>
body{margin:0;font-family:Arial;transition:0.4s;background:#f5f5f5}

header{background:#111;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px}
.logo-img{width:42px;height:42px;border-radius:50%}
.logo-text{font-size:20px;font-weight:bold}

.marquee{background:red;color:#fff;font-size:12px;padding:4px;overflow:hidden}
.marquee span{display:inline-block;padding-left:100%;animation:run 12s linear infinite}
@keyframes run{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

.top-bar{display:flex;justify-content:center;margin:10px}
.toggle-btn{font-size:20px;padding:10px;border:none;border-radius:50px;cursor:pointer;transition:0.3s}
.toggle-btn:hover{transform:scale(1.2)}

.container{padding:15px;display:flex;flex-direction:column;gap:15px}

.card{border-radius:14px;overflow:hidden;background:#fff;text-align:center;cursor:pointer;transition:0.3s;animation:fadeUp .6s}
.card:hover{transform:scale(1.05);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.card img{width:100%;height:160px;object-fit:cover;transition:.3s}
.card img:hover{transform:scale(1.1)}
.card h3{margin:10px}

.footer{background:#111;padding:15px;display:flex;justify-content:center;gap:10px}
.footer button{padding:10px 14px;border:none;border-radius:30px;cursor:pointer;transition:.3s}
.footer button:hover{transform:scale(1.15);box-shadow:0 5px 15px rgba(0,0,0,.5)}

.popup{position:fixed;top:20px;right:20px;background:#333;color:#fff;padding:12px 16px;border-radius:10px;display:none;animation:fadeSlide .5s}

.dark{background:#111;color:#fff}
.dark .card{background:#222;color:#fff}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}

/* SIDE MENU */
.side-menu{
 position:fixed;
 top:0;
 right:-300px; /* ẩn hoàn toàn */
 width:260px;
 height:100%;
 background:#fff;
 box-shadow:-5px 0 15px rgba(0,0,0,.2);
 padding:20px 15px;
 transition:.4s ease;
 z-index:999;
 overflow:auto;
 display:flex;
 flex-direction:column;
 align-items:center;
}
.side-menu.active{right:0}
}
.side-menu.active{right:0}
.side-menu h3{margin:15px 0 8px;font-size:15px;width:100%;text-align:left}
.menu-item{
 padding:10px;
 border-radius:8px;
 margin-bottom:6px;
 cursor:pointer;
 transition:.3s;
 width:100%;
 display:flex;
 align-items:center;
 gap:8px
}
}
.menu-item:hover{background:#eee}

.menu-icon{font-size:16px}

.dark .side-menu{
 position:fixed;
 top:0;
 right:-300px; /* ẩn hoàn toàn */
 width:260px;
 height:100%;
 background:#fff;
 box-shadow:-5px 0 15px rgba(0,0,0,.2);
 padding:20px 15px;
 transition:.4s ease;
 z-index:999;
 overflow:auto;
 display:flex;
 flex-direction:column;
 align-items:center;
}
.side-menu.active{right:0}
.dark .menu-item:hover{background:#222}

.overlay{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,.4);
 display:none;
 z-index:998;
}
.overlay.active{display:block}
.overlay.active{display:block}

</style></head><body><div class="overlay" id="overlay" onclick="closeMenu()"></div><div class="side-menu" id="sideMenu"><div style="text-align:center;margin-bottom:10px;">
    <img src="logo.png" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
    <div style="font-weight:bold;margin-top:5px">MENU</div>
</div>
<h3>-- SHOP ACC --</h3>
<div class="menu-item" onclick="goPage('vip.html')"><span class="menu-icon">💎</span>Acc VIP</div>
<div class="menu-item" onclick="goPage('clone.html')"><span class="menu-icon">🧩</span>Acc Clone</div>
<div class="menu-item" onclick="goPage('thuong.html')"><span class="menu-icon">📦</span>Acc Thường</div>

<h3>-- CÀY THUÊ --</h3>
<div class="menu-item" onclick="goPage('ball.html')"><span class="menu-icon">⚽</span>Cày Ball</div>
<div class="menu-item" onclick="goPage('vang.html')"><span class="menu-icon">💰</span>Cày Vàng</div>
<div class="menu-item" onclick="goPage('cotruyen.html')"><span class="menu-icon">📖</span>Cày Cốt Truyện</div>
<div class="menu-item" onclick="goPage('dautruong.html')"><span class="menu-icon">🏆</span>Cày Đấu Trường</div>

</div><header>
<img src="logo.png" class="logo-img">
<div class="logo-text">THTSC SHOP</div>
</header><div class="marquee"><span>🔥 Shop Acc THTSC Uy Tín - Giá Rẻ - Tự Động 🔥</span></div><div class="top-bar">
<button class="toggle-btn" onclick="toggleMode()" id="modeBtn">🌙</button>
</div><div class="container">
<div class="card" onclick="goPage('vip.html')">
<img src="https://via.placeholder.com/400x200?text=VIP">
<h3>Acc VIP</h3>
</div><div class="card" onclick="goPage('clone.html')">
<img src="https://via.placeholder.com/400x200?text=CLONE">
<h3>Acc Clone</h3>
</div><div class="card" onclick="goPage('thuong.html')">
<img src="https://via.placeholder.com/400x200?text=THUONG">
<h3>Acc Thường</h3>
</div>
</div><div class="footer">
<button onclick="goLink('https://zalo.me/0123456789')">Zalo</button>
<button onclick="goLink('https://zalo.me/g/xxxx')">Group Zalo</button>
<button onclick="goLink('https://facebook.com/yourpage')">Facebook</button>
</div><div id="popup" class="popup">Chào mừng đến shop!</div><script>
function showPopup(){let p=document.getElementById('popup');p.style.display='block';setTimeout(()=>{p.style.display='none'},3000)}

function toggleMode(){let b=document.body;let btn=document.getElementById('modeBtn');b.classList.toggle('dark');btn.innerHTML=b.classList.contains('dark')?'☀️':'🌙'}

function goPage(link){window.location.href=link}
function goLink(link){window.open(link,'_blank')}

window.onload=showPopup;
</script></body>
</html>
